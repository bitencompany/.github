name: 기능 요청
description: 개선 사항이나 새로운 기능을 제안합니다.
title: "[FEAT]: "
body:
  - type: textarea
    id: problem
    attributes:
      label: 배경
      placeholder: 어떤 문제나 필요가 있나요?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 제안
      placeholder: 어떤 기능이나 개선이 필요하나요?
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: 완료 기준
      placeholder: 이 기능이 완료됐다고 볼 수 있는 조건을 적어주세요.
