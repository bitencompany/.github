name: 작업
description: 구현, 설정, 유지보수 작업을 등록합니다.
title: "[CHORE]: "
labels: ["task"]
body:
  - type: textarea
    id: summary
    attributes:
      label: 작업 내용
      placeholder: 무엇을 해야 하나요?
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: 완료 기준
      placeholder: 작업 완료를 판단할 기준을 적어주세요.
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: 참고
      placeholder: 관련 링크, 이슈, 메모가 있다면 적어주세요.
