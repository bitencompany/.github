name: 리팩터링
description: 동작 변경 없이 코드 구조를 개선합니다.
title: "[REFACTOR]: "
labels: ["refactor"]
body:
  - type: textarea
    id: target
    attributes:
      label: 대상
      placeholder: 어떤 코드나 구조를 개선하나요?
    validations:
      required: true
  - type: textarea
    id: reason
    attributes:
      label: 이유
      placeholder: 왜 리팩터링이 필요한가요?
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: 범위
      placeholder: 변경 범위와 제외할 범위를 적어주세요.
